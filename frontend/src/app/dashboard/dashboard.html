<div class="dashboard-container">
  <header class="topbar">
    <h1 class="brand">PrediMenú</h1>
    <div class="user-info">
      <span>{{ username }}</span>
      <button class="logout-btn" (click)="logout()">Salir</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" (click)="irA('/dashboard')">Dashboard</button>
    <button class="tab" (click)="irA('/monitoreo')">Monitoreo</button>
    <button class="tab" (click)="irA('/cierre')">Cierre</button>
  </nav>

  <main class="content">
    <div class="card form-card">
      <h2 class="card-title">Generar predicción diaria</h2>

      <div class="plato-selector" #platoSelector>
        <label class="field-label">Platos</label>
        <div class="chips-container">
          <span class="chip" *ngFor="let plato of platosSeleccionados">
            {{ plato.nombre }}
            <button type="button" (click)="quitarPlato(plato)">×</button>
          </span>
          <input
            type="text"
            [(ngModel)]="busquedaPlato"
            (focus)="mostrarSugerencias = true"
            placeholder="Buscar plato..."
            autocomplete="off"
          />
        </div>

        <ul class="sugerencias" *ngIf="mostrarSugerencias && sugerencias.length > 0">
          <li *ngFor="let plato of sugerencias" (mousedown)="agregarPlato(plato)">
            {{ plato.nombre }}
            <span class="plato-precio">${{ plato.precio | number }}</span>
          </li>
        </ul>
      </div>

      <label class="field-label">Clima</label>
      <select class="field-input" [(ngModel)]="clima">
        <option [ngValue]="1">Soleado</option>
        <option [ngValue]="2">Lluvioso</option>
        <option [ngValue]="3">Nublado</option>
      </select>

      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="esFestivo" /> Es día festivo/evento especial
      </label>

      <button class="generate-btn" (click)="generar()" [disabled]="loading">
        {{ loading ? 'Generando...' : 'Generar predicción' }}
      </button>

      <div *ngIf="errorMsg" class="status-msg error">{{ errorMsg }}</div>
    </div>

    <div *ngIf="resultados.length > 0" class="card full-width">
      <h2 class="card-title">Producción recomendada</h2>
      <table class="platos-table">
        <thead>
          <tr>
            <th>Plato</th>
            <th>Cantidad sugerida</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of resultados">
            <td>{{ r.nombre_plato }}</td>
            <td>{{ r.cantidad_predicha }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
